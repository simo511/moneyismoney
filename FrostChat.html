/* ── Voice Player ── */
function renderVoicePlayer(m,own){
  const dur=parseInt(m.text)||0;
  const wrap=h("div",{className:"voice-player"});
  const barH=[4,8,14,9,16,10,5,15,8,5,12,9,15,7,16,5,10,4,8,5];
  let audioEl=null, playing=false, ivl=null;
  const btn=h("button",{className:"vp-btn"});
  btn.appendChild(ico("mic",17,own?"rgba(255,255,255,.9)":"var(--ac)"));
  const waveWrap=h("div",{style:{flex:"1",display:"flex",flexDirection:"column",gap:"4px"}});
  const barsEl=h("div",{className:"vp-waves"});
  const barEls=barH.map(bh=>{
    const b=h("div",{className:"vp-bar",style:{height:bh+"px",opacity:".45"}});
    barsEl.appendChild(b); return b;
  });
  waveWrap.appendChild(barsEl);
  const info=h("div",{className:"vp-info"});
  const durEl=h("span",{className:"vp-dur"},dur+"s");
  info.appendChild(durEl);
  info.appendChild(h("span",{className:"vp-label"},"Voice message 🎤"));
  waveWrap.appendChild(info);
  wrap.appendChild(btn); wrap.appendChild(waveWrap);
  const stopAnim=()=>{
    clearInterval(ivl); playing=false;
    btn.classList.remove("playing"); btn.innerHTML="";
    btn.appendChild(ico("mic",17,own?"rgba(255,255,255,.9)":"var(--ac)"));
    durEl.textContent=dur+"s";
    barEls.forEach((b,i)=>{b.style.height=barH[i]+"px";b.style.opacity=".45";b.classList.remove("active");});
  };
  btn.onclick=()=>{
    if(playing){audioEl?.pause();stopAnim();return;}
    playing=true;
    btn.classList.add("playing");btn.innerHTML="";
    const sq=h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:own?"rgba(255,255,255,.9)":"var(--ac)"}});
    btn.appendChild(sq);
    if(m.audioData){audioEl=new Audio(m.audioData);audioEl.play().catch(()=>{});audioEl.onended=stopAnim;}
    let t2=0,elapsed=0;
    ivl=setInterval(()=>{
      t2++;elapsed++;
      durEl.textContent=elapsed+"s / "+dur+"s";
      barEls.forEach((b,i)=>{
        const nh=barH[i]*(0.4+0.6*Math.abs(Math.sin(t2*0.4+i*0.5)));
        b.style.height=Math.max(2,nh).toFixed(1)+"px";b.style.opacity="1";
        if(i<=Math.round((elapsed/dur)*barEls.length))b.classList.add("active");
      });
      if(!m.audioData&&elapsed>=dur)stopAnim();
    },1000);
  };
  return wrap;
}

/* ─── Render online game window ─── */
function renderOnlineGame(){
  const game = S.onlineGame;
  if(!game || !S.activeGameId) return null;

  const ov = h("div", {className:"online-game-overlay", onClick: e=>{if(e.target===ov)closeOnlineGame();}});
  const modal = h("div", {className:"online-game-modal", onClick:e=>e.stopPropagation()});

  const isHost = game.host === S.user.name;
  const mySymbol = isHost ? "X" : "O";
  const isMyTurn = game.turn === S.user.name;

  // Header
  const hdr = h("div", {style:{marginBottom:"12px"}});
  if(game.type === "tictactoe"){
    hdr.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"900"}},"❌ Tic Tac Toe ⭕"));
    const subTxt = game.status==="finished"
      ? (game.winner==="draw"?"🤝 Draw!":game.winner===S.user.name?"🏆 You won!":"😔 You lost")
      : (isMyTurn ? "🟢 Your turn! You: "+mySymbol : "⏳ "+game.turn+"'s turn");
    hdr.appendChild(h("div",{style:{fontSize:"12px",color:isMyTurn?"var(--ac)":"var(--t3)",marginTop:"4px",fontWeight:"700"}},subTxt));
  } else {
    hdr.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"900"}},"✊ Rock Paper Scissors"));
    const myPick = isHost ? game.hostPick : game.guestPick;
    const subTxt = game.status==="finished"
      ? (game.rpsResult||"Game over")
      : myPick ? "⏳ Waiting for opponent..." : "🟢 Choose!";
    hdr.appendChild(h("div",{style:{fontSize:"12px",color:"var(--t3)",marginTop:"4px",fontWeight:"700"}},subTxt));
  }

  // Opponents
  const players = h("div",{style:{display:"flex",justifyContent:"center",gap:"20px",marginBottom:"14px",alignItems:"center"}});
  const p1=h("div",{style:{textAlign:"center"}});
  p1.appendChild(h("div",{style:{fontSize:"24px"}},"👤"));
  p1.appendChild(h("div",{style:{fontSize:"10px",fontWeight:"800",color:"var(--ac)"}},(game.host===S.user.name?"You":game.host)));
  p1.appendChild(h("div",{style:{fontSize:"9px",color:"var(--t3)"}},"X"));
  players.appendChild(p1);
  players.appendChild(h("div",{style:{fontSize:"16px",color:"var(--t3)"}},"VS"));
  const p2=h("div",{style:{textAlign:"center"}});
  p2.appendChild(h("div",{style:{fontSize:"24px"}},"👤"));
  p2.appendChild(h("div",{style:{fontSize:"10px",fontWeight:"800",color:"#4ade80"}},(game.guest===S.user.name?"You":game.guest)));
  p2.appendChild(h("div",{style:{fontSize:"9px",color:"var(--t3)"}},"O"));
  players.appendChild(p2);
  modal.appendChild(hdr);
  modal.appendChild(players);

  // Game content
  if(game.type === "tictactoe"){
    const grid = h("div",{className:"ttt-grid"});
    (game.board||Array(9).fill(null)).forEach((cell,i)=>{
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      let isWinCell = false;
      if(game.winner && game.winner!=="draw"){
        for(const [a,b,c] of wins){
          if(game.board[a]&&game.board[a]===game.board[b]&&game.board[a]===game.board[c]&&(i===a||i===b||i===c)){
            isWinCell=true;break;
          }
        }
      }
      const btn = h("button",{
        className:"ttt-cell"+(cell?" filled "+cell:"")+(isWinCell?" winner-cell":""),
        onClick:()=>{ if(game.status==="playing")onlineTTTMove(S.activeGameId,i); }
      }, cell||"");
      grid.appendChild(btn);
    });
    modal.appendChild(grid);

  } else if(game.type === "rps"){
    const myPick = isHost ? game.hostPick : game.guestPick;
    const oppPick = isHost ? game.guestPick : game.hostPick;

    // Show picks if game finished
    if(game.status === "finished" && myPick && oppPick){
      const picks = h("div",{style:{display:"flex",justifyContent:"center",gap:"24px",margin:"16px 0",fontSize:"48px"}});
      picks.appendChild(h("div",{style:{textAlign:"center"}},
        h("div",{},myPick), h("div",{style:{fontSize:"9px",color:"var(--t3)",marginTop:"4px"}},"You")));
      picks.appendChild(h("div",{style:{fontSize:"20px",alignSelf:"center",color:"var(--t3)"}},"VS"));
      picks.appendChild(h("div",{style:{textAlign:"center"}},
        h("div",{},oppPick), h("div",{style:{fontSize:"9px",color:"var(--t3)",marginTop:"4px"}},"Opponent")));
      modal.appendChild(picks);
    } else if(!myPick){
      // Choose
      const choices = h("div",{style:{display:"flex",justifyContent:"center",gap:"12px",margin:"16px 0"}});
      ["✊","✌️","🖐️"].forEach(em=>{
        const btn=h("button",{style:{
          fontSize:"40px",padding:"16px",borderRadius:"16px",border:"2px solid var(--bd2)",
          background:"var(--bg2)",cursor:"pointer",transition:"all .2s"
        },onClick:()=>onlineRPSMove(S.activeGameId,em)},em);
        choices.appendChild(btn);
      });
      modal.appendChild(choices);
    } else {
      // Waiting
      modal.appendChild(h("div",{style:{padding:"20px",fontSize:"32px",textAlign:"center"}},myPick));
      modal.appendChild(h("div",{style:{textAlign:"center",color:"var(--t3)",fontSize:"12px"}},"Chosen! Waiting for opponent..."));
    }
  }

  // Buttons
  const btns = h("div",{style:{display:"flex",gap:"8px",marginTop:"14px"}});
  if(game.status === "finished"){
    if(game.type==="tictactoe"){
      const replayBtn=h("button",{style:{flex:"1",padding:"10px",borderRadius:"12px",background:"linear-gradient(135deg,var(--ac),var(--ac2))",border:"none",color:"#fff",cursor:"pointer",fontSize:"11px",fontWeight:"800"},
        onClick:async()=>{
          const newGame={...game,board:Array(9).fill(null),turn:game.host,winner:null,moves:0,status:"playing",ts:Date.now()};
          const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
          await fetch(B+"/"+GAME_DB_PATH+"/"+S.activeGameId+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(newGame)});
        }},"🔄 New Game");
      btns.appendChild(replayBtn);
    }
  }
  const closeBtn=h("button",{style:{flex:"1",padding:"10px",borderRadius:"12px",background:"var(--bg3)",border:"1px solid var(--bd2)",color:"var(--t3)",cursor:"pointer",fontSize:"11px",fontWeight:"800"},
    onClick:closeOnlineGame},"✕ Close");
  btns.appendChild(closeBtn);
  modal.appendChild(btns);

  ov.appendChild(modal);
  return ov;
}

  const inp=document.createElement("input");

    const r=new FileReader();
    r.onload=ev=>{
      S.avatars={...S.avatars,[forUser]:ev.target.result};

      render();
    };
    r.readAsDataURL(f);
  };

}

/* ════════════════════════════════
   SECURITY — XSS PROTECTION
════════════════════════════════ */
function sanitize(str){
  if(typeof str !== "string") return str;
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#x27;");
}
// Simple message encryption (Base64 + XOR)
const MSG_KEY = 0x46; // 'F' for FrostChat
function encryptMsg(text){
  try{
    const encoded = btoa(unescape(encodeURIComponent(text)));
    return encoded.split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^((MSG_KEY+i)%256))).join("");
  }catch(e){ return text; }
}
function decryptMsg(text){
  try{
    const decoded = text.split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^((MSG_KEY+i)%256))).join("");
    return decodeURIComponent(escape(atob(decoded)));
  }catch(e){ return text; }
}

async function sendPoll(chatId, question, options){
  const pollMsg = {
    id: uid(), from: S.user.name,
    text: question,
    ts: Date.now(), type: "poll",
    poll: { question, options: options.map(o=>({text:o,votes:[]})), total:0 },
    replyTo: null, starred: false, reactions: {}, deleted: false, edited: false,
  };
  await DB.sendMessage(chatId, pollMsg);
}

async function votePoll(chatId, msgId, optIndex){
  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const res = await fetch(B+"/messages/"+chatId+"/"+msgId+".json");
  const msg = await res.json();
  if(!msg||!msg.poll) return;
  const poll = JSON.parse(JSON.stringify(msg.poll));
  // Remove previous vote
  poll.options.forEach(o=>{ o.votes=o.votes.filter(v=>v!==S.user.name); });
  // Add new vote
  poll.options[optIndex].votes.push(S.user.name);
  poll.total = poll.options.reduce((s,o)=>s+o.votes.length,0);
  await fetch(B+"/messages/"+chatId+"/"+msgId+"/poll.json",{
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(poll)
  });
}

function renderPollBubble(m, own){
  const poll = m.poll;
  const wrap = h("div",{className:"poll-wrap"});
  wrap.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)",marginBottom:"6px",fontFamily:"JetBrains Mono,monospace",fontWeight:"700"}},"📊 Create Poll"));
  wrap.appendChild(h("div",{className:"poll-title"},poll.question));
  const total = poll.total || 1;
  poll.options.forEach((opt,i)=>{
    const myVote = opt.votes.includes(S.user.name);
    const pct = Math.round((opt.votes.length/total)*100)||0;
    const div = h("div",{className:"poll-opt"+(myVote?" voted":""),onClick:()=>{ if(m.chatId||S.activeChat)votePoll(S.activeChat?.id||m.chatId,m.id,i); }});
    const bw = h("div",{className:"poll-bar-wrap"});
    const bar = h("div",{className:"poll-bar",style:{width:pct+"%"}});
    bw.appendChild(bar);
    const lbl = h("div",{className:"poll-opt-label"});
    lbl.appendChild(h("span",{style:{fontWeight:myVote?"800":"600"}},opt.text));
    lbl.appendChild(h("span",{style:{fontFamily:"JetBrains Mono,monospace",fontSize:"10px"}},pct+"%"));
    bw.appendChild(lbl);
    div.appendChild(bw);
    wrap.appendChild(div);
  });
  wrap.appendChild(h("div",{className:"poll-total"},poll.total+" votes"));
  return wrap;
}

/* ─── PUSH NOTIFICATIONS ─── */
async function requestNotifPerm(){
  if(!("Notification" in window)){showToast("Notifications not supported","⚠️");return;}
  const perm=await Notification.requestPermission();
  S.notifGranted=perm==="granted";
  if(perm==="granted") showToast((T).notifOn,"✅");
  else showToast("Notifications blocked","❌");
  render();
}

function sendLocalNotif(from,text){
  if(!S.notifGranted||document.hasFocus())return;
  try{
    const n=new Notification("FrostChat — "+from,{
      body:text&&text.length>60?text.slice(0,60)+"…":text||"New message",
      icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>",
      badge:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>",
      tag:"frostchat-msg",
      renotify:true,
      silent:false,
    });
    n.onclick=()=>{window.focus();n.close();};
    setTimeout(()=>n.close(),5000);
  }catch(e){}
}

function boot(){
  window.__appRender=render;
  // Apply saved color theme
  if(S.colorTheme&&S.colorTheme!=="frost")applyColorTheme(S.colorTheme);
  render();
  // Auto clean other accounts if admin
  setTimeout(autoCleanUsers, 2000);
  if(!S.user)return;
  const name=S.user.name;
  // Start presence heartbeat
  startPresenceHeartbeat(name);
  DB.setUser(name,{...S.user,online:true,lastSeen:Date.now()});
  DB.setupPresence(name);
  UNSUB.users=DB.onUsers(u=>{
    const raw=u||{};
    // exclude current user from list to prevent duplicates
    S.users={};
    Object.entries(raw).forEach(([k,v])=>{
      if(v&&v.name&&v.name!==S.user?.name) S.users[k]=v;
    });
    if(!S.users[YOU_NAME])S.users[YOU_NAME]={name:YOU_NAME,online:true,status:"Your personal space 📝",vipCode:""};
    render();
  });
  UNSUB.chats=DB.onChats(c=>{
    const myChats=Object.values(c||{}).filter(ch=>ch?.members?.includes(name));
    S.chats=myChats;
    myChats.forEach(ch=>{
      if(!UNSUB["msgs_"+ch.id]){
        UNSUB["msgs_"+ch.id]=DB.onMessages(ch.id,msgsMap=>{
          if(msgsMap&&Object.keys(msgsMap).length>0){
            const prev=Object.values(S.messages[ch.id]||{}).length;
            const curr=Object.values(msgsMap).length;
            if(curr>prev){
              const newMsg=Object.values(msgsMap).sort((a,b)=>a.ts-b.ts).pop();
              if(newMsg&&newMsg.from!==name&&S.activeChat?.id!==ch.id){
                S.unread={...S.unread,[ch.id]:(S.unread[ch.id]||0)+1};
                sendLocalNotif(newMsg.from,newMsg.type==="image"?"📸 Image":newMsg.type==="voice"?"🎤 Voice message":newMsg.text);
              }
            }
            S.messages={...S.messages,[ch.id]:msgsMap};
          }
          render();
        });
      }
    });
    render();
  });
}

function logout(){
  S.user=null;S.chats=[];S.activeChat=null;S.messages={};S.users={};
  localStorage.removeItem("fc_user");
  Object.values(UNSUB).forEach(f=>typeof f==="function"&&f());
  render();
}
window.__appRender=render;
boot();
