<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#05101f"/>
<meta name="apple-mobile-web-app-title" content="FrostChat"/>
<meta name="description" content="FrostChat — Real-time messaging"/>
<title>FrostChat ❄️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════════
   FROSTCHAT v10 — ELITE DESIGN SYSTEM
   Inspired by nothing — Original
════════════════════════════════════════════════════════════ */

/* ── FONTS ── */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap');

/* ── ROOT VARIABLES ── */
:root {
  --sidebar-w: 320px;

  /* Backgrounds */
  --bg0: #02080f;
  --bg1: #060f1c;
  --bg2: #0a1828;
  --bg3: #0f2035;
  --bg4: #152843;

  /* Accent */
  --ac:  #38bdf8;
  --ac2: #0ea5e9;
  --ac3: #0284c7;
  --acg: rgba(56,189,248,.13);
  --acd: rgba(56,189,248,.06);

  /* Text */
  --t1: #e8f4fd;
  --t2: #89b8d6;
  --t3: #3d6480;
  --t4: #1e3d55;

  /* Borders */
  --bd:  rgba(56,189,248,.06);
  --bd2: rgba(56,189,248,.14);
  --bd3: rgba(56,189,248,.25);

  /* Shadows */
  --sh:  0 8px 32px rgba(0,0,0,.7);
  --sh2: 0 2px 12px rgba(0,0,0,.4);
  --sh3: 0 20px 60px rgba(0,0,0,.8);

  /* Radius */
  --r:  14px;
  --r2: 20px;
  --r3: 24px;

  /* Transitions */
  --tr: .18s cubic-bezier(.22,1,.36,1);
  --tr2: .28s cubic-bezier(.22,1,.36,1);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
body {
  font-family: 'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;
  background: var(--bg0);
  color: var(--t1);
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ac3); }
* { -webkit-tap-highlight-color: transparent; }

/* ── BACKGROUND GLOW ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(56,189,248,.05), transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(14,165,233,.04), transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(2,132,199,.02),  transparent 70%);
}
#app, #root { position: relative; z-index: 1; }

/* ── APP SHELL ── */
#app {
  display: flex;
  height: 100dvh;
  width: 100%;
  max-width: 1440px;
  margin: 0 auto;
  background: var(--bg0);
  overflow: hidden;
}

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--bd);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

.s-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
  position: relative;
}

/* ── TABS ── */
.tabs {
  display: flex;
  width: 100%;
  background: var(--bg1);
  border-bottom: 1px solid var(--bd);
  padding: 6px 8px;
  gap: 4px;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 4px;
  background: transparent;
  border: none;
  border-radius: 12px;
  color: var(--t3);
  cursor: pointer;
  transition: all var(--tr);
  font-family: 'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;
  position: relative;
  overflow: hidden;
}
.tab::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--acg);
  border-radius: 12px;
  opacity: 0;
  transition: opacity var(--tr);
}
.tab:hover { color: var(--t2); }
.tab:hover::before { opacity: .5; }
.tab.active { color: var(--ac); }
.tab.active::before { opacity: 1; }
.tab.active .tab-icon { filter: drop-shadow(0 0 8px rgba(56,189,248,.7)); }

.tab-icon { font-size: 18px; line-height: 1; display: block; transition: transform var(--tr); }
.tab:active .tab-icon { transform: scale(.9); }
.tab-label { font-size: 9px; font-weight: 800; letter-spacing: .3px; white-space: nowrap; }

/* ── SEARCH ── */
.search-wrap {
  padding: 8px 10px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
.search-inp {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--bd2);
  border-radius: 12px;
  padding: 8px 12px 8px 34px;
  color: var(--t1);
  font-family: 'Plus Jakarta Sans',sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color var(--tr), box-shadow var(--tr);
}
.search-inp:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(56,189,248,.08); }
.search-inp::placeholder { color: var(--t3); }

/* ── CHAT ITEMS ── */
.chat-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 12px;
  margin: 1px 6px;
  border-radius: 14px;
  cursor: pointer;
  transition: background var(--tr);
  position: relative;
  overflow: hidden;
}
.chat-item::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  opacity: 0;
  background: var(--acg);
  transition: opacity var(--tr);
  pointer-events: none;
}
.chat-item:hover::after { opacity: 1; }
.chat-item.active {
  background: var(--acg);
  box-shadow: inset 0 0 0 1px var(--bd2);
}
.chat-item.active .ci-name { color: var(--ac); }
.chat-item.pinned { border-left: 2px solid var(--ac); }
.chat-item.muted { opacity: .5; }

.ci-info { flex: 1; min-width: 0; }
.ci-name {
  font-size: 13px; font-weight: 700; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 5px;
  transition: color var(--tr);
}
.ci-last { font-size: 11px; color: var(--t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.ci-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.ci-time { font-size: 9px; color: var(--t3); font-family: 'JetBrains Mono',monospace; }

/* ── UNREAD BADGE ── */
.unread-badge {
  background: var(--ac);
  color: #020c18;
  font-size: 9px; font-weight: 800;
  padding: 2px 6px; border-radius: 10px;
  min-width: 18px; text-align: center;
  font-family: 'JetBrains Mono',monospace;
  animation: badgePop .3s cubic-bezier(.34,1.56,.64,1);
}

/* ══════════════════════════════
   AVATAR
══════════════════════════════ */
.av {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: #fff; flex-shrink: 0;
  position: relative;
  font-family: 'Plus Jakarta Sans',sans-serif;
}
.av-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid var(--bg1);
  box-shadow: 0 0 6px rgba(34,197,94,.6);
  animation: onlinePulse 2.5s ease infinite;
}
.av-custom { object-fit: cover; border-radius: 50%; width: 100%; height: 100%; }
.av-upload-ring { position: relative; display: inline-flex; cursor: pointer; }
.av-upload-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--tr); font-size: 20px;
}
.av-upload-ring:hover .av-upload-overlay { opacity: 1; }

/* ══════════════════════════════
   CHAT PANEL
══════════════════════════════ */
#chat-panel {
  flex: 1; display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
  background: var(--bg0); min-width: 0;
}

.chat-hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--bd);
  background: var(--bg1);
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--bd), 0 2px 16px rgba(0,0,0,.3);
  position: relative; z-index: 10;
}
.chat-hdr-info { flex: 1; min-width: 0; }
.chat-hdr-name {
  font-size: 15px; font-weight: 800; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.chat-hdr-sub { font-size: 10px; color: var(--ac); font-family: 'JetBrains Mono',monospace; margin-top: 1px; }
.chat-hdr-sub.offline { color: var(--t3); }

/* ── MESSAGES AREA ── */
#msgs-area {
  flex: 1 1 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 1px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  min-height: 0;
}

/* ── DATE DIVIDER ── */
.date-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 12px 0; flex-shrink: 0;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--bd2);
}
.date-divider span {
  background: var(--bg2); border: 1px solid var(--bd2);
  padding: 2px 12px; border-radius: 20px;
  font-size: 9px; color: var(--t3); white-space: nowrap;
  font-family: 'JetBrains Mono',monospace;
}

/* ══════════════════════════════
   MESSAGES / BUBBLES
══════════════════════════════ */
.msg-row {
  display: flex; align-items: flex-end; gap: 7px;
  animation: msgIn .2s ease both;
  margin-bottom: 2px;
}
.msg-row.own { flex-direction: row-reverse; }
.msg-row + .msg-row.own,
.msg-row + .msg-row:not(.own) { margin-top: 1px; }

.bubble {
  padding: 9px 13px;
  border-radius: 18px;
  max-width: min(340px, 76vw);
  min-width: 60px;
  font-size: 13.5px;
  line-height: 1.55;
  word-break: break-word;
  position: relative;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  user-select: text;
}
.bubble:active { transform: scale(.98); }

/* Own bubble */
.msg-row.own .bubble {
  background: linear-gradient(145deg, #0ea5e9, #0369a1);
  color: #fff;
  border-bottom-right-radius: 5px;
  box-shadow: 0 3px 14px rgba(14,165,233,.35), inset 0 1px 0 rgba(255,255,255,.1);
}
/* Other bubble */
.msg-row:not(.own) .bubble {
  background: var(--bg3);
  color: var(--t1);
  border-bottom-left-radius: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  border: 1px solid var(--bd);
}
/* YOU bubble */
.msg-row.you-msg .bubble {
  background: linear-gradient(145deg, #1d4ed8, #1e40af);
  color: #eff6ff;
  border-bottom-left-radius: 5px;
}

/* Sender name in group */
.bubble-sender { font-size: 10px; font-weight: 800; margin-bottom: 3px; opacity: .8; }

/* Footer */
.bubble-footer {
  display: flex; align-items: center; gap: 4px;
  margin-top: 4px; justify-content: flex-end;
}
.bubble-footer .bf-time { font-size: 9px; opacity: .55; font-family: 'JetBrains Mono',monospace; white-space: nowrap; }
.bf-read { font-size: 10px; opacity: .7; }

/* Reply preview */
.reply-in-bubble {
  background: rgba(0,0,0,.2);
  border-left: 3px solid rgba(255,255,255,.4);
  border-radius: 8px;
  padding: 5px 9px;
  margin-bottom: 6px;
  font-size: 10px; opacity: .85;
  cursor: pointer;
}
.msg-row:not(.own) .reply-in-bubble {
  background: rgba(56,189,248,.08);
  border-left-color: var(--ac);
}

/* Reactions */
.rxn-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.rxn-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg4); border: 1px solid var(--bd2);
  border-radius: 20px; padding: 3px 8px;
  font-size: 12px; cursor: pointer;
  transition: all var(--tr);
  animation: rxnBurst .3s cubic-bezier(.34,1.56,.64,1) both;
}
.rxn-chip:hover { background: var(--acg); border-color: var(--ac); }
.rxn-chip.mine { background: var(--acg); border-color: var(--ac); }
.rxn-count { font-size: 10px; font-weight: 700; color: var(--t2); font-family: 'JetBrains Mono',monospace; }

/* Reaction picker */
.rxn-picker {
  position: absolute; bottom: calc(100% + 6px);
  background: var(--bg2); border: 1px solid var(--bd2);
  border-radius: 30px; padding: 6px 10px;
  display: flex; gap: 4px;
  box-shadow: var(--sh); z-index: 50;
  animation: popIn .18s ease;
}
.rxn-picker button {
  background: none; border: none; font-size: 20px;
  cursor: pointer; transition: transform .12s; padding: 3px; border-radius: 8px;
}
.rxn-picker button:hover { transform: scale(1.4); background: var(--bg3); }

/* Deleted / edited */
.bubble.deleted { opacity: .5; font-style: italic; }
.edit-tag { font-size: 9px; opacity: .5; margin-left: 4px; }

/* Image bubble */
.img-bubble-wrap {
  max-width: 240px; border-radius: 14px;
  overflow: hidden; cursor: pointer; background: var(--bg4);
  position: relative;
}
.img-bubble-wrap img { width: 100%; display: block; max-height: 220px; object-fit: cover; transition: filter .2s; }
.img-bubble-wrap:hover img { filter: brightness(.82); }
.img-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; font-size: 30px;
}
.img-bubble-wrap:hover .img-overlay { opacity: 1; }

/* ══════════════════════════════
   INPUT BAR
══════════════════════════════ */
#input-bar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: var(--bg1);
  border-top: 1px solid var(--bd);
  flex-shrink: 0; position: relative; z-index: 10;
}
.msg-input {
  flex: 1;
  background: var(--bg2);
  border: 1.5px solid var(--bd2);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--t1);
  font-family: 'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;
  font-size: 14px;
  resize: none; outline: none;
  max-height: 120px; min-height: 42px;
  line-height: 1.5;
  transition: border-color var(--tr), box-shadow var(--tr);
}
.msg-input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(56,189,248,.1); }
.msg-input::placeholder { color: var(--t3); }

.send-btn {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none; border-radius: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #020c18; flex-shrink: 0;
  transition: all var(--tr);
  box-shadow: 0 2px 10px rgba(14,165,233,.4);
  font-size: 13px; font-weight: 800;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 18px rgba(14,165,233,.5); }
.send-btn:active { transform: scale(.95); }

/* Reply bar */
.reply-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: var(--bg2); border-top: 1px solid var(--bd);
  flex-shrink: 0;
}
.reply-line { width: 3px; height: 32px; background: var(--ac); border-radius: 3px; flex-shrink: 0; }

/* ══════════════════════════════
   ICON BUTTONS
══════════════════════════════ */
.ib {
  width: 36px; height: 36px;
  background: transparent; border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--t3); transition: all var(--tr); flex-shrink: 0;
}
.ib:hover { background: var(--bg3); color: var(--t2); }
.ib:active { transform: scale(.9); }

/* ══════════════════════════════
   GENERIC INPUTS & BUTTONS
══════════════════════════════ */
.inp {
  width: 100%;
  background: var(--bg2); border: 1.5px solid var(--bd2);
  border-radius: 12px; padding: 10px 13px;
  color: var(--t1); font-family: 'Plus Jakarta Sans',sans-serif;
  font-size: 13px; outline: none; transition: border-color var(--tr), box-shadow var(--tr);
}
.inp:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(56,189,248,.08); }
.inp::placeholder { color: var(--t3); }

.btn { padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all var(--tr); font-family: 'Plus Jakarta Sans',sans-serif; }
.btn-primary { background: linear-gradient(135deg, var(--ac), var(--ac2)); color: #020c18; box-shadow: 0 2px 12px rgba(14,165,233,.35); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(14,165,233,.45); }
.btn-primary:active { transform: scale(.97); }
.btn-ghost { background: var(--bg3); color: var(--t2); border: 1px solid var(--bd2); }
.btn-ghost:hover { background: var(--bg4); }
.btn-danger { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
.btn-danger:hover { background: rgba(239,68,68,.2); }

/* ══════════════════════════════
   MODALS
══════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.78);
  backdrop-filter: blur(8px) saturate(1.5);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--bg1);
  border: 1px solid var(--bd2);
  border-radius: var(--r2);
  padding: 22px;
  width: min(440px, 95vw);
  box-shadow: var(--sh3);
  animation: slideUp .25s cubic-bezier(.22,1,.36,1);
  position: relative; z-index: 501;
}
.modal-title { font-size: 17px; font-weight: 900; color: var(--t1); margin-bottom: 16px; }

/* ══════════════════════════════
   DROPDOWN
══════════════════════════════ */
.dropdown {
  position: absolute;
  background: var(--bg2); border: 1px solid var(--bd2);
  border-radius: var(--r); padding: 6px;
  box-shadow: var(--sh); z-index: 100;
  min-width: 170px;
  animation: slideUp .18s ease;
  backdrop-filter: blur(12px);
}
.ditem {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 10px;
  cursor: pointer; font-size: 12px; font-weight: 700;
  color: var(--t1); transition: background var(--tr);
  background: transparent; border: none; width: 100%;
  text-align: left;
  font-family: 'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;
}
.ditem:hover { background: var(--bg3); }
.ditem.danger { color: #f87171; }
.ditem.danger:hover { background: rgba(239,68,68,.1); }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--bd3);
  color: var(--t1); border-radius: 22px;
  padding: 9px 18px; font-size: 12px; font-weight: 700;
  z-index: 9999; box-shadow: var(--sh);
  pointer-events: none; white-space: nowrap;
  backdrop-filter: blur(12px);
  animation: toastSlideUp .25s ease;
}

/* ══════════════════════════════
   EMPTY STATE
══════════════════════════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 16px; padding: 40px; text-align: center;
}
.empty-icon { font-size: 64px; filter: drop-shadow(0 0 28px rgba(56,189,248,.55)); animation: fabBounce 3s ease infinite; }
.grad-txt {
  background: linear-gradient(135deg, #38bdf8, #60a5fa, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  font-size: 30px; font-weight: 900; letter-spacing: -.5px;
}
.empty-sub { font-size: 12px; color: var(--t3); max-width: 200px; line-height: 1.6; }

/* ══════════════════════════════
   PEOPLE LIST
══════════════════════════════ */
.people-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; margin: 1px 6px; border-radius: 14px;
  cursor: pointer; transition: background var(--tr);
}
.people-item:hover { background: var(--bg3); }

/* ══════════════════════════════
   VIP / OWNER BADGES
══════════════════════════════ */
.owner-badge {
  display: inline-flex; align-items: center; gap: 3px;
  background: linear-gradient(135deg, #1a0800, #3d1a00);
  color: #f59e0b; border: 1px solid rgba(245,158,11,.6);
  border-radius: 6px; padding: 2px 7px;
  font-size: 9px; font-weight: 900;
  font-family: 'JetBrains Mono',monospace; letter-spacing: .6px;
  box-shadow: 0 0 10px rgba(245,158,11,.35); text-shadow: 0 0 8px rgba(245,158,11,.7);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.owner-badge::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(245,158,11,.15), transparent);
  animation: ownerShimmer 2.5s ease-in-out infinite;
}
.vip-badge-new {
  display: inline-flex; align-items: center; gap: 3px;
  border-radius: 6px; padding: 1px 6px;
  font-size: 9px; font-weight: 900;
  font-family: 'JetBrains Mono',monospace; letter-spacing: .4px; flex-shrink: 0;
}
.vip-gold { background: linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.1)); color: #fbbf24; border: 1px solid rgba(245,158,11,.45); }
.vip-blue { background: linear-gradient(135deg,rgba(59,130,246,.2),rgba(59,130,246,.1)); color: #60a5fa; border: 1px solid rgba(59,130,246,.4); }
.vip-pink { background: linear-gradient(135deg,rgba(236,72,153,.2),rgba(236,72,153,.1)); color: #f472b6; border: 1px solid rgba(236,72,153,.4); }
.vip-green { background: linear-gradient(135deg,rgba(52,211,153,.2),rgba(52,211,153,.1)); color: #34d399; border: 1px solid rgba(52,211,153,.4); }
.vip-red { background: linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.1)); color: #f87171; border: 1px solid rgba(239,68,68,.4); }

/* ══════════════════════════════
   VOICE PLAYER
══════════════════════════════ */
.vp-wrap { display: flex; align-items: center; gap: 8px; min-width: 150px; }
.vp-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  flex-shrink: 0; transition: all var(--tr);
}
.vp-btn:hover { background: rgba(255,255,255,.22); transform: scale(1.05); }
.vp-bars { display: flex; align-items: center; gap: 2px; height: 26px; flex: 1; }
.vp-bar { width: 3px; border-radius: 2px; background: rgba(255,255,255,.3); transition: height .1s; }
.vp-bar.active { background: rgba(255,255,255,.9); animation: waveAnim .8s ease infinite; }
.vp-time { font-size: 9px; opacity: .65; font-family: 'JetBrains Mono',monospace; flex-shrink: 0; }

/* ══════════════════════════════
   SETTINGS
══════════════════════════════ */
.setting-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 12px; border-radius: 14px; margin-bottom: 6px;
  cursor: pointer; background: var(--bg2); border: 1px solid var(--bd);
  transition: all var(--tr);
}
.setting-row:hover { border-color: var(--bd2); background: var(--bg3); transform: translateX(2px); }
.setting-icon { font-size: 18px; flex-shrink: 0; }
.setting-label { flex: 1; font-size: 12px; font-weight: 700; color: var(--t1); }
.setting-val { font-size: 10px; color: var(--t3); font-family: 'JetBrains Mono',monospace; background: var(--bg3); padding: 2px 8px; border-radius: 6px; }

/* ══════════════════════════════
   POLL WIDGET
══════════════════════════════ */
.poll-wrap { min-width: 200px; max-width: 280px; }
.poll-title { font-size: 13px; font-weight: 800; margin-bottom: 10px; }
.poll-opt {
  margin-bottom: 7px; cursor: pointer;
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--bd2); transition: border-color var(--tr);
}
.poll-opt:hover { border-color: var(--ac); }
.poll-bar-wrap { position: relative; height: 34px; background: var(--bg3); }
.poll-bar { height: 100%; background: var(--acg); transition: width .5s ease; }
.poll-opt-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 10px; font-size: 11px; font-weight: 700;
}
.poll-opt.voted .poll-bar { background: linear-gradient(90deg, rgba(56,189,248,.25), rgba(56,189,248,.1)); }
.poll-total { font-size: 9px; color: var(--t3); margin-top: 6px; font-family: 'JetBrains Mono',monospace; }

/* ══════════════════════════════
   STATUS BAR
══════════════════════════════ */
.status-bar {
  display: flex; gap: 10px;
  padding: 10px 12px; overflow-x: auto;
  border-bottom: 1px solid var(--bd); flex-shrink: 0;
  scrollbar-width: none;
}
.status-bar::-webkit-scrollbar { display: none; }
.status-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
.status-ring {
  width: 50px; height: 50px; border-radius: 50%;
  background: conic-gradient(var(--ac) 0deg, var(--ac2) 180deg, var(--bg3) 180deg);
  padding: 2.5px; transition: transform var(--tr);
}
.status-ring:hover { transform: scale(1.08); }
.status-ring-inner { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--bg1); overflow: hidden; }
.status-name { font-size: 9px; font-weight: 700; color: var(--t2); white-space: nowrap; max-width: 52px; overflow: hidden; text-overflow: ellipsis; }
.status-add-btn {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--bg3); border: 2px dashed var(--bd2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer; transition: all var(--tr);
}
.status-add-btn:hover { border-color: var(--ac); background: var(--acg); }

/* ══════════════════════════════
   CONN BADGE
══════════════════════════════ */
#conn-badge {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(239,68,68,.9); color: #fff; border-radius: 20px;
  padding: 5px 14px; font-size: 10px; font-weight: 800;
  z-index: 9999; display: none; gap: 6px; align-items: center;
  backdrop-filter: blur(8px); border: 1px solid rgba(239,68,68,.5);
}

/* ══════════════════════════════
   ADMIN PANEL
══════════════════════════════ */
.admin-wrap { position: fixed; inset: 0; background: var(--bg0); z-index: 3000; display: flex; flex-direction: column; overflow: hidden; }
.admin-hdr {
  background: linear-gradient(135deg,#0d0600,#1a0a00,#0d0600);
  border-bottom: 1px solid rgba(245,158,11,.3);
  padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; position: relative;
}
.admin-hdr-glow { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%,rgba(245,158,11,.08),transparent 70%); pointer-events: none; }
.admin-tab-bar { display: flex; background: var(--bg1); border-bottom: 1px solid var(--bd); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.admin-tab { flex: 1; min-width: 60px; padding: 10px 8px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--t3); cursor: pointer; font-size: 10px; font-weight: 800; transition: all var(--tr); white-space: nowrap; font-family: 'Plus Jakarta Sans',sans-serif; }
.admin-tab.active { border-bottom-color: #f59e0b; color: #f59e0b; }
.admin-tab:hover:not(.active) { color: var(--t2); background: var(--bg2); }
.admin-user-card { background: var(--bg1); border: 1px solid var(--bd); border-radius: 14px; padding: 12px; margin-bottom: 10px; transition: border-color var(--tr); }
.admin-user-card.online { border-color: rgba(56,189,248,.3); }
.admin-user-card.banned { border-color: rgba(239,68,68,.3); opacity: .8; }

/* ══════════════════════════════
   MISC COMPONENTS
══════════════════════════════ */
.highlight { background: rgba(56,189,248,.28) !important; border-radius: 3px; padding: 0 2px; color: var(--t1) !important; }
.rec-active { color: #f87171; animation: pulse 1.2s infinite; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
.typing-dot { width: 6px; height: 6px; background: var(--t3); border-radius: 50%; display: inline-block; animation: typingBounce 1.2s ease infinite; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
.ban-chip { display: inline-flex; align-items: center; gap: 3px; background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.3); border-radius: 6px; padding: 2px 7px; font-size: 9px; font-weight: 800; font-family: 'JetBrains Mono',monospace; }
.link-preview { background: rgba(0,0,0,.2); border-left: 3px solid var(--ac); border-radius: 8px; padding: 6px 10px; margin-top: 6px; font-size: 10px; }
.emoji-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 3px; border-radius: 8px; transition: transform .12s, background .12s; line-height: 1; }
.emoji-btn:hover { transform: scale(1.3); background: var(--bg3); }
.scroll-to-bottom { position: absolute; bottom: 70px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--bd2); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--sh); transition: all var(--tr); z-index: 10; font-size: 16px; }
.scroll-to-bottom:hover { background: var(--ac); border-color: var(--ac); transform: scale(1.1); }
.prof-sheet { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: flex-end; }
.prof-sheet-inner { width: 100%; max-height: 90vh; background: var(--bg1); border-radius: 24px 24px 0 0; border: 1px solid var(--bd2); overflow-y: auto; animation: sheetUp .32s cubic-bezier(.22,1,.36,1); }
.game-invite-card { background: linear-gradient(135deg, var(--bg2), var(--bg3)); border: 1px solid var(--bd2); border-radius: 14px; padding: 12px 14px; min-width: 200px; max-width: 260px; }
.game-accept-btn { flex: 1; padding: 7px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--ac), var(--ac2)); color: #020c18; font-size: 11px; font-weight: 800; cursor: pointer; transition: all var(--tr); }
.game-accept-btn:hover { transform: scale(1.03); }
.game-decline-btn { flex: 1; padding: 7px; border-radius: 10px; border: 1px solid var(--bd2); background: var(--bg3); color: var(--t3); font-size: 11px; font-weight: 800; cursor: pointer; }
.online-game-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); backdrop-filter: blur(10px); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 16px; }
.online-game-modal { background: var(--bg1); border: 1px solid var(--bd2); border-radius: var(--r2); padding: 22px; width: min(380px, 95vw); text-align: center; box-shadow: var(--sh3); animation: popIn .28s cubic-bezier(.34,1.56,.64,1); }
.ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
.ttt-cell { aspect-ratio: 1; border-radius: 12px; font-size: 32px; font-weight: 900; border: 2px solid var(--bd2); background: var(--bg2); cursor: pointer; transition: all var(--tr); display: flex; align-items: center; justify-content: center; }
.ttt-cell:hover:not(.filled) { background: var(--bg3); border-color: var(--ac); }
.ttt-cell.X { border-color: rgba(239,68,68,.5); color: #f87171; }
.ttt-cell.O { border-color: rgba(52,211,153,.5); color: #4ade80; }
.ttt-cell.winner-cell { background: var(--acg); border-color: var(--ac); }
.img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,.96); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.img-viewer img { max-width: 95vw; max-height: 80vh; border-radius: 10px; object-fit: contain; }

/* ── COLOR THEMES ── */
[data-theme="ocean"]   { --ac:#06b6d4;--ac2:#0891b2;--bg0:#020e14;--bg1:#051520;--bg2:#082030;--bg3:#0c2a3f;--bg4:#10354f }
[data-theme="violet"]  { --ac:#a78bfa;--ac2:#8b5cf6;--bg0:#06030d;--bg1:#0e0b18;--bg2:#161225;--bg3:#1e1830;--bg4:#26203c }
[data-theme="rose"]    { --ac:#fb7185;--ac2:#f43f5e;--bg0:#0a0305;--bg1:#140810;--bg2:#1e0e18;--bg3:#281422;--bg4:#321a2c }
[data-theme="emerald"] { --ac:#34d399;--ac2:#10b981;--bg0:#020806;--bg1:#05110c;--bg2:#081a12;--bg3:#0c2218;--bg4:#102b1f }
[data-theme="amber"]   { --ac:#fbbf24;--ac2:#f59e0b;--bg0:#080501;--bg1:#110b03;--bg2:#1a1106;--bg3:#231709;--bg4:#2c1d0c }

/* ══════════════════════════════
   ANIMATIONS
══════════════════════════════ */
@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes slideUp   { from{opacity:0;transform:translateY(18px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes msgIn     { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes popIn     { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
@keyframes bounce    { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
@keyframes spin      { to{transform:rotate(360deg)} }
@keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.35} }
@keyframes badgePop  { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
@keyframes rxnBurst  { 0%{opacity:0;transform:scale(0) rotate(-15deg)} 60%{transform:scale(1.3)} 100%{opacity:1;transform:scale(1)} }
@keyframes sheetUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes waveAnim  { 0%,100%{height:4px} 50%{height:20px} }
@keyframes toastSlideUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes ownerShimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
@keyframes onlinePulse  { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 50%{box-shadow:0 0 0 4px rgba(34,197,94,0)} }
@keyframes typingBounce { 0%,80%,100%{transform:translateY(0) scale(1);opacity:.4} 40%{transform:translateY(-6px) scale(1.1);opacity:1} }
@keyframes fabBounce    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes callPulse    { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2.2);opacity:0} }
@keyframes particleFly  { 0%{transform:translateY(100vh);opacity:0} 10%{opacity:.5} 90%{opacity:.3} 100%{transform:translateY(-10px) translateX(var(--dx,0px));opacity:0} }
@keyframes loginFloat   { from{opacity:0;transform:translateY(30px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes sendPulse    { 0%{transform:scale(1)} 30%{transform:scale(1.2)} 70%{transform:scale(.93)} 100%{transform:scale(1)} }

/* ══════════════════════════════
   MOBILE
══════════════════════════════ */
@media (max-width: 700px) {
  :root { --sidebar-w: 100vw; }

  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 200;
    transform: translateX(0);
    transition: transform var(--tr2);
    width: 100vw; min-width: 0; height: 100dvh;
  }
  #sidebar.hidden-mobile { transform: translateX(-100%); }

  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 199; display: none; backdrop-filter: blur(3px);
  }
  .sidebar-overlay.show { display: block; }

  #chat-panel {
    position: fixed; inset: 0; z-index: 100;
    width: 100vw; height: 100dvh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  #msgs-area { padding: 10px 10px; }
  .bubble { max-width: 82vw !important; font-size: 13px !important; }
  .msg-input { font-size: 16px !important; }
  .modal { width: 95vw !important; border-radius: 18px !important; padding: 18px !important; }
  .tab { padding: 7px 3px; }
  .ib { width: 34px; height: 34px; }
  .chat-hdr { padding: 10px 12px; }
  #input-bar { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
}

/* ════════════════════════════════════════
   UI/UX v11 — ELITE REACTIONS & STICKERS
════════════════════════════════════════ */

/* ── REACTION PICKER — floating pill ── */
.rxn-picker-float {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%; transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--bd3);
  border-radius: 50px;
  padding: 6px 10px;
  display: flex; gap: 2px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(56,189,248,.1);
  z-index: 200;
  animation: rxnPickerIn .2s cubic-bezier(.34,1.56,.64,1) both;
  white-space: nowrap;
  backdrop-filter: blur(16px);
  min-width: max-content;
}
.rxn-picker-float::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--bd3);
  border-bottom: none;
}
.rxn-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: none; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), background .12s;
  position: relative;
}
.rxn-btn:hover {
  transform: scale(1.55) translateY(-4px);
  background: var(--bg3);
  z-index: 1;
}
.rxn-btn:active { transform: scale(.9); }

/* ── REACTION CHIPS — redesigned ── */
.rxn-row {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 6px; padding: 0 2px;
}
.rxn-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.12);
  border-radius: 30px; padding: 3px 9px;
  font-size: 14px; cursor: pointer;
  transition: all .15s cubic-bezier(.22,1,.36,1);
  animation: rxnChipIn .25s cubic-bezier(.34,1.56,.64,1) both;
  user-select: none;
}
.msg-row.own .rxn-chip {
  background: rgba(255,255,255,.12);
  border-color: rgba(255,255,255,.2);
}
.rxn-chip:hover {
  transform: scale(1.08);
  border-color: var(--ac);
  background: var(--acg);
}
.rxn-chip.mine {
  background: var(--acg);
  border-color: var(--ac);
  box-shadow: 0 0 10px rgba(56,189,248,.25);
}
.rxn-count {
  font-size: 10px; font-weight: 800;
  color: var(--t2);
  font-family: 'JetBrains Mono',monospace;
}

/* ── FLOATING REACTION LABEL ── */
.rxn-label {
  position: fixed;
  background: var(--bg0);
  border: 1px solid var(--bd2);
  border-radius: 8px; padding: 4px 10px;
  font-size: 11px; color: var(--t2); font-weight: 700;
  pointer-events: none; z-index: 9000;
  box-shadow: var(--sh);
  animation: fadeIn .15s ease;
  white-space: nowrap;
}

/* ══ STICKERS PANEL ══ */
.sticker-panel {
  position: absolute; bottom: calc(100% + 8px);
  left: 0; right: 0;
  background: var(--bg1);
  border: 1px solid var(--bd2);
  border-radius: 18px 18px 0 0;
  box-shadow: 0 -8px 32px rgba(0,0,0,.5);
  z-index: 300;
  animation: stickersUp .28s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
  max-height: 320px;
  display: flex; flex-direction: column;
}
.sticker-tabs {
  display: flex; gap: 0; padding: 8px 10px 0;
  border-bottom: 1px solid var(--bd); flex-shrink: 0;
  overflow-x: auto; scrollbar-width: none;
}
.sticker-tabs::-webkit-scrollbar { display: none; }
.sticker-tab {
  padding: 6px 14px; background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 18px; transition: all .15s;
  border-radius: 8px 8px 0 0; flex-shrink: 0;
}
.sticker-tab.active { border-bottom-color: var(--ac); background: var(--acg); }
.sticker-tab:hover:not(.active) { background: var(--bg3); }
.sticker-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 6px; padding: 10px; overflow-y: auto;
  flex: 1;
}
.sticker-item {
  aspect-ratio: 1; border-radius: 12px;
  background: var(--bg2); border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; cursor: pointer;
  transition: all .15s cubic-bezier(.34,1.56,.64,1);
}
.sticker-item:hover {
  transform: scale(1.15) rotate(-3deg);
  background: var(--acg); border-color: var(--ac);
  box-shadow: 0 4px 16px rgba(56,189,248,.3);
}
.sticker-item:active { transform: scale(.9); }

/* ── STICKER BUBBLE ── */
.sticker-bubble {
  font-size: 56px; line-height: 1;
  background: none !important;
  border: none !important;
  box-shadow: none !important;
  padding: 4px !important;
  min-width: unset !important;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.4));

/* ==========================================
   FIREBASE REST API
========================================== */
(function(){
  var B="https://frostchat-whithout-number-default-rtdb.firebaseio.com",L={};
  function url(p){return B+"/"+p.replace(/^\/+/,"")+".json";}
  // Block .info paths — not supported in REST API
  function safeGet(p){if(p&&p.indexOf(".info")!==-1)return Promise.resolve(null);return get(p);}
  async function get(p){try{var r=await fetch(url(p));return r.ok?await r.json():null;}catch(e){return null;}}
  async function set(p,v){try{await fetch(url(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function upd(p,v){try{await fetch(url(p),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}}
  async function del(p){try{await fetch(url(p),{method:"DELETE"});}catch(e){}}
  function listen(p,cb){
    if(!L[p]){L[p]={cbs:[],last:undefined,t:null};
      var poll=async function(){if(p&&p.indexOf(".info")!==-1)return;var d=await get(p),h=JSON.stringify(d);if(h!==L[p].last){L[p].last=h;L[p].cbs.forEach(function(f){f(d);});}};
      poll();L[p].t=setInterval(poll,2000);}
    L[p].cbs.push(cb);
    return function(){if(!L[p])return;L[p].cbs=L[p].cbs.filter(function(f){return f!==cb;});if(!L[p].cbs.length){clearInterval(L[p].t);delete L[p];}};}
  function ref(p){return{_path:p,
    set:function(v){return set(p,v);},update:function(v){return upd(p,v);},remove:function(){return del(p);},
    once:function(){return get(p).then(function(v){return{val:function(){return v;}};});},
    on:function(e,cb){listen(p,function(d){cb({val:function(){return d;}});});},
    off:function(){if(L[p]){clearInterval(L[p].t);delete L[p];}},
    onDisconnect:function(){return{set:function(v){window.addEventListener("beforeunload",function(){navigator.sendBeacon(url(p),JSON.stringify(v));});}};}
  };}
  // Use a simple fetch to check connectivity instead of .info
  fetch(B+"/.json?shallow=true",{method:"GET"}).then(function(r){
    window.__fbConnected=r.ok||r.status===401||r.status===403;
    var b=document.getElementById("conn-badge");
    if(b){b.style.display=window.__fbConnected?"none":"flex";}
    if(window.__appRender)window.__appRender();
  }).catch(function(){
    window.__fbConnected=false;
    var b=document.getElementById("conn-badge");
    if(b){b.style.display="flex";}
  });
  window.__fb={
    ref:function(db,p){return ref(p);},
    set:function(r,v){return r.set(v);},
    update:function(r,v){return r.update(v);},
    push:function(r,v){var k=Date.now()+"_"+Math.random().toString(36).slice(2,8);return ref(r._path+"/"+k).set(v).then(function(){return{key:k};});},
    onValue:function(r,cb){return listen(r._path,function(d){cb({val:function(){return d;}});});},
    off:function(r){r.off();},get:function(r){return r.once();},remove:function(r){return r.remove();},
    onDisconnect:function(r){return r.onDisconnect();},serverTimestamp:function(){return Date.now();},
    query:function(r){return r;},orderByChild:function(){return function(r){return r;};},limitToLast:function(){return function(r){return r;};}
  };
  window.__fbReady=true;
})();

    const r=ref(db,"typing/"+chatId);
    const unsub=onValue(r,snap=>cb(snap.val()||{}));
    return unsub||function(){off(r);};
  },
  setupPresence(name){
    const {db,ref,set,onDisconnect}=window.__fb;
    const key=name.replace(/[.#$[\]]/g,"_");
    const userRef=ref(db,"users/"+key);
    // Set online immediately
    set(userRef,{...S.user,online:true,lastSeen:Date.now()});
    // Set offline on disconnect
    const od=onDisconnect(userRef);
    if(od&&od.set)od.set({...S.user,online:false,lastSeen:Date.now()});
  }
};

function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="text")el.textContent=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"))el.value=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(k==="href")el.href=v;
    else if(k==="target")el.target=v;
    else if(k==="disabled")el.disabled=v;
    else if(k==="rows")el.rows=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{if(c instanceof Node)el.appendChild(c);else if(c!=null&&c!==false)el.appendChild(document.createTextNode(String(c)));});
  return el;
}

function timeFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
}
function dateFmt(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return T.today;
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return T.yesterday;
  return d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
}

let _recTimer;
let _mediaRec=null, _recChunks=[], _recStream=null;

async function startRec(e){
  if(e)e.preventDefault();
  if(S.rec)return;
  try{
    _recStream = await navigator.mediaDevices.getUserMedia({audio:true});
    _recChunks = [];
    _mediaRec = new MediaRecorder(_recStream);
    _mediaRec.ondataavailable = ev => { if(ev.data.size>0) _recChunks.push(ev.data); };
    _mediaRec.start(100);
    S.rec=true; S.recSec=0;
    _recTimer=setInterval(()=>{ S.recSec++; render(); },1000);
    render();
  }catch(err){
    showToast("Microphone access denied ❌","");
    S.rec=false; render();
  }
}

async function stopRec(e){
  if(e)e.preventDefault();
  if(!S.rec || !_mediaRec)return;
  clearInterval(_recTimer);
  const secs = S.recSec;
  S.rec=false; S.recSec=0;
  if(secs<1){
    _mediaRec.stop();
    _recStream?.getTracks().forEach(t=>t.stop());
    render(); return;
  }
  await new Promise(res=>{ _mediaRec.onstop=res; _mediaRec.stop(); });
  _recStream?.getTracks().forEach(t=>t.stop());
  const blob = new Blob(_recChunks, {type:"audio/webm"});
  const reader = new FileReader();
  reader.onload = async () => {
    const audioData = reader.result; // base64 data URL
    const msg={id:uid(),from:S.user.name,text:secs+"s",ts:Date.now(),type:"voice",
      audioData, replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(S.activeChat.id,msg);
    render();
  };
  reader.readAsDataURL(blob);
  render();
}

/* ─── Connection status fix ─── */
function startPresenceHeartbeat(name){
  const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const key=name.replace(/[.#$[\]]/g,"_");
  
  async function setOnline(){
    try{
      await fetch(B+"/users/"+key+"/online.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:"true"});
      await fetch(B+"/users/"+key+"/lastSeen.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:Date.now().toString()});
    }catch(e){}
  }
  
  async function setOffline(){
    try{
      await fetch(B+"/users/"+key+"/online.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:"false"});
      await fetch(B+"/users/"+key+"/lastSeen.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:Date.now().toString()});
    }catch(e){}
  }

  setOnline();
  window._heartbeat=setInterval(setOnline, 25000);
  window.addEventListener("beforeunload", ()=>{ setOffline(); clearInterval(window._heartbeat); });
  document.addEventListener("visibilitychange", ()=>{
    if(document.hidden) setOffline();
    else setOnline();
  });
}


/* ─── Advanced Admin Tools ─── */
async function adminBroadcast(msg){
  if(!isAdmin()||!msg) return;
  const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  // Send message to all chats
  const res = await fetch(B+"/chats.json");
  const chats = await res.json();
  if(!chats) return;
  let count=0;
  for(const [cid, chat] of Object.entries(chats)){
    if(!chat||!chat.members) continue;
    const broadMsg={id:uid(),from:"simo511",text:"📢 "+msg,ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false,broadcast:true};
    await fetch(B+"/messages/"+cid+"/"+broadMsg.id+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(broadMsg)});
    count++;
  }
  showToast("📢 Sent to "+count+" chats","✅");
}

async function adminSetMaintenance(on){
  const B="https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  await fetch(B+"/system/maintenance.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(on)});
  showToast(on?"🔧 Maintenance mode ON":"✅ Site is open","");
}

// Hash password simply (SHA-256 like using btoa)
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Check if username exists in Firebase (using REST API wrapper)
async function usernameExists(username) {
  const r = window.__fb.ref(null, "auth/" + username.toLowerCase());
  const snap = await window.__fb.get(r);
  const val = snap && snap.val ? snap.val() : snap;
  return val !== null && val !== undefined;
}

// Register new account
async function registerAccount(username, password) {
  const hash = await hashPassword(password);
  const userData = {
    username: username.toLowerCase(),
    displayName: username,
    hash,
    createdAt: Date.now(),
    vipCode: "",
    status: "",
    online: false,
    banned: false,
  };
  const authRef = window.__fb.ref(null, "auth/" + username.toLowerCase());
  await window.__fb.set(authRef, {username: username.toLowerCase(), hash, createdAt: Date.now()});
  const userRef = window.__fb.ref(null, "users/" + username);
  await window.__fb.set(userRef, {...userData, online: true});
  return userData;
}

// Login with password
async function loginAccount(username, password) {
  const hash = await hashPassword(password);
  const authRef = window.__fb.ref(null, "auth/" + username.toLowerCase());
  const snap = await window.__fb.get(authRef);
  const data = snap && snap.val ? snap.val() : snap;
  if(!data) return {error: "nouser"};
  if(data.hash !== hash) return {error: "wrongpass"};
  const userRef = window.__fb.ref(null, "users/" + username);
  const userSnap = await window.__fb.get(userRef);
  const userData = userSnap && userSnap.val ? userSnap.val() : userSnap;
  if(userData && userData.banned) return {error: "banned"};
  return {success: true, displayName: username};
}

// Check if it's the owner account
function isOwnerAccount(username) {
  return username && username.toLowerCase() === "simo511";
}

async function completeLogin(name, userData){

    vipCode,
    online: true,
    lastSeen: Date.now(),
    joinedAt: userData?.createdAt||Date.now()

  // Load saved user data if exists
  const saved = JSON.parse(localStorage.getItem("fc_user")||"null");
  if(saved && saved.name === name){
    S.user = {...saved, online:true, lastSeen:Date.now(), vipCode};

  S.vipCode = vipCode;
  S.authLoading = false;

  localStorage.setItem("fc_user", JSON.stringify(S.user));

  await DB.setUser(name, {...S.user, online:true});

  await ensureYouChat(name);
  boot();
}

    menuItems.push({ic:"smile",lb:"🎮 Games",fn:()=>{S.gameMenu=!S.gameMenu;render();}});
    menuItems.push({ic:"lock",lb:"⏳ Disappearing",fn:()=>{S.disappearMenu=!S.disappearMenu;render();}});
    if(c.name!==YOU_NAME)menuItems.push({ic:"logout",lb:T.deleteChat,fn:()=>{deleteChat(c.id);},danger:true});
    menuItems.forEach(item=>{
      const btn=h("button",{className:"ditem"+(item.danger?" danger":""),onClick:item.fn});
      btn.appendChild(ico(item.ic,13,item.danger?"#f87171":"var(--t3)"));
      btn.appendChild(document.createTextNode(" "+item.lb));
      menu.appendChild(btn);
    });
    moreWrap.appendChild(menu);
  }
  // Game submenu — Online only
  if(S.gameMenu){
    const gm=h("div",{style:{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bd)",display:"flex",gap:"8px",flexWrap:"wrap",flexShrink:"0",alignItems:"center"}});
    gm.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)",fontWeight:"700",marginRight:"4px"}},"🎮 Challenge:"));
    const opponent = c.type==="dm" ? c.name : null;
    if(!opponent){
      gm.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Games only available in DM chats"));
    } else {
      [{key:"tictactoe",label:"❌⭕ Tic Tac Toe"},{key:"rps",label:"✊ Rock Paper Scissors"}].forEach(({key,label})=>{
        const gb=h("button",{
          style:{background:"var(--bg2)",border:"1px solid var(--bd2)",borderRadius:"20px",padding:"6px 14px",cursor:"pointer",fontSize:"11px",fontWeight:"700",color:"var(--t2)",transition:"all .15s"},
          onClick:async()=>{ S.gameMenu=false; render(); await sendGameInvite(key, c.id, opponent); }
        },label);
        gm.appendChild(gb);
      });
    }
    wrap.appendChild(gm);
  }
  // Disappear submenu
  if(S.disappearMenu){
    const dm=h("div",{style:{padding:"8px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bd)",display:"flex",gap:"6px",flexWrap:"wrap",flexShrink:"0",alignItems:"center"}});
    dm.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)",fontWeight:"700"}},"⏳ Disappear after:"));
    [[0,"Off"],[30,"30s"],[300,"5min"],[3600,"1hr"],[86400,"24hr"]].forEach(([s,lb])=>{
      const cur=getDisappearing(c.id)===s;
      const btn=h("button",{style:{background:cur?"var(--acg)":"var(--bg2)",border:"1px solid "+(cur?"var(--ac)":"var(--bd2)"),borderRadius:"16px",padding:"4px 10px",cursor:"pointer",fontSize:"10px",fontWeight:"800",color:cur?"var(--ac)":"var(--t3)"},
        onClick:()=>{setDisappearing(c.id,s);S.disappearMenu=false;render();}},lb);
      dm.appendChild(btn);
    });
    wrap.appendChild(dm);
  }
  // Admin button (only for LEAD)
  if(isAdmin()){
    const adminBtn=h("button",{className:"ib",title:"Admin Panel",onClick:()=>{
      S.adminPanel=true;
      S.adminTab="overview";
      loadAdminData();
      render();
    }});
    adminBtn.appendChild(h("span",{style:{fontSize:"16px",filter:"drop-shadow(0 0 6px #f59e0b)",display:'block',lineHeight:'1'}},"👑"));
    hdr.appendChild(adminBtn);
  }
  hdr.appendChild(moreWrap);wrap.appendChild(hdr);

  // Search bar
  if(S.chatSearch){
    const sb=h("div",{style:{padding:"6px 12px",background:"var(--bg1)",borderBottom:"1px solid var(--bd)",flexShrink:"0"}});
    const si=h("input",{className:"inp",type:"text",placeholder:T.search,style:{margin:"0",padding:"7px 12px",fontSize:"12px"},value:S.chatSearchQ||""});
    si.addEventListener("input",e=>{S.chatSearchQ=e.target.value;clearTimeout(window._csq);window._csq=setTimeout(render,200);});
    sb.appendChild(si);wrap.appendChild(sb);
    setTimeout(()=>si.focus(),30);
  }

  // Stories disabled

  // Messages area
  const chatTheme=getChatTheme(c.id);
  const msgsWrap=h("div",{id:"msgs-area",style:{flex:"1",overflowY:"auto",padding:"12px 14px",background:chatTheme.bg,backgroundImage:chatTheme.pattern||"none"},onClick:()=>{S.msgMenu=null;S.chatMenu=false;if(S.msgMenu!==null)render();}});

  const allMsgs=Object.values(S.messages[c.id]||{}).filter(m=>m&&m.id).sort((a,b)=>a.ts-b.ts);
  const filteredMsgs=S.chatSearchQ?allMsgs.filter(m=>m.text&&m.text.toLowerCase().includes(S.chatSearchQ.toLowerCase())):allMsgs;

  if(S.chatSearchQ&&!filteredMsgs.length){
    const nr=h("div",{style:{textAlign:"center",padding:"30px",color:"var(--t3)",fontSize:"11px"}});
    nr.appendChild(document.createTextNode('🔍 No results for "'+S.chatSearchQ+'"'));
    msgsWrap.appendChild(nr);
  } else if(!allMsgs.length){
    const es=h("div",{style:{textAlign:"center",padding:"40px 16px",color:"var(--t3)"}});
    if(c.name===YOU_NAME){
      es.appendChild(h("div",{style:{fontSize:"30px",marginBottom:"8px"}},"📝"));
      es.appendChild(h("div",{style:{fontSize:"13px",fontWeight:"700",color:"var(--t2)",marginBottom:"4px"}},"Your personal space"));
      es.appendChild(h("div",{style:{fontSize:"10px"}},T.youDesc));
    } else {
      es.appendChild(h("div",{style:{fontSize:"13px",fontWeight:"700",color:"var(--t2)",marginBottom:"4px"}},T.hello));
      const enc=h("div",{style:{fontSize:"9px",display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}});
      enc.appendChild(ico("lock",9,"var(--t3)"));enc.appendChild(document.createTextNode(" "+T.e2e));
      es.appendChild(enc);
    }
    msgsWrap.appendChild(es);
  } else {
    const byDate={};
    filteredMsgs.forEach(m=>{const d=dateFmt(m.ts);if(!byDate[d])byDate[d]=[];byDate[d].push(m);});
    Object.entries(byDate).forEach(([date,msgs])=>{
      const dl=h("div",{className:"date-divider"});
      dl.appendChild(h("span",{},date));
      msgsWrap.appendChild(dl);
      msgs.forEach(m=>msgsWrap.appendChild(renderMessage(m,c)));
    });
  }

  if(S.botTyping){
    const ti=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});
    ti.appendChild(av(c.name,22,{}));
    const tb=h("div",{style:{background:"var(--bg2)",border:"1px solid var(--bd2)",borderRadius:"18px",padding:"10px 14px",display:"flex",gap:"3px",alignItems:"center"}});
    [0,1,2].forEach(i=>{const d=h("span",{className:"typing-dot",style:{animationDelay:i*.2+"s"}});tb.appendChild(d);});
    ti.appendChild(tb);msgsWrap.appendChild(ti);
  }

  msgsWrap.appendChild(h("div",{id:"msgs-end"}));
  wrap.appendChild(msgsWrap);

  // Reply bar
  if(S.replyTo){
    const rb=h("div",{className:"reply-bar"});
    rb.appendChild(h("div",{className:"reply-line"}));
    rb.appendChild(ico("reply",11,"var(--ac)"));
    const ri=h("div",{style:{flex:"1",minWidth:"0"}});
    ri.appendChild(h("div",{style:{fontSize:"9px",color:"var(--ac)",fontWeight:"800",marginBottom:"1px"}},T.replyTo+" "+S.replyTo.from));
    ri.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},S.replyTo.text?.slice(0,60)));
    rb.appendChild(ri);
    const rx=h("button",{style:{background:"none",border:"none",cursor:"pointer"},onClick:()=>{S.replyTo=null;render();}});
    rx.appendChild(ico("block",13,"var(--t3)"));rb.appendChild(rx);
    wrap.appendChild(rb);
  }

  // Emoji picker
  if(S.emojiOpen){
    const EMOJIS="😀😂🥰😎🤔😅🥳😢😡🤗🫶😴🤩👍❤️🔥✨🎉👏🙏💯💪🌟🎵⚡🍀🌈💎👑❄️🌙⭐🏔️🎯🚀💬🤝😆🥹🎊🙌😍🤣😘💀👻🎃🌹🦋🌊🏆💡🎶🍕🍔🍦🎂🎁🎈🎤🎸🏀⚽🎮";
    const ep=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"2px",padding:"8px 10px",maxHeight:"110px",overflowY:"auto",borderTop:"1px solid var(--bd)",background:"var(--bg1)",flexShrink:"0"}});
    [...EMOJIS].forEach(em=>{
      const btn=h("button",{className:"emoji-btn"});btn.textContent=em;
      btn.onclick=()=>{
        const ta=document.getElementById("chat-input");
        if(ta){const p=ta.selectionStart;ta.value=ta.value.slice(0,p)+em+ta.value.slice(p);S.input=ta.value;ta.focus();ta.setSelectionRange(p+em.length,p+em.length);}
        else S.input+=em;
        S.emojiOpen=false;render();
      };
      ep.appendChild(btn);
    });
    wrap.appendChild(ep);
  }

  // Input bar
  const ibar=h("div",{style:{padding:"8px 10px",background:"var(--bg1)",borderTop:"1px solid var(--bd)",display:"flex",alignItems:"flex-end",gap:"6px",flexShrink:"0"}});

  const emojiBtn=h("button",{className:"ib",onClick:()=>{S.emojiOpen=!S.emojiOpen;render();}});
  emojiBtn.appendChild(ico("smile",20,S.emojiOpen?"var(--ac)":"var(--t3)"));ibar.appendChild(emojiBtn);
  const attachMenu=h("div",{style:{position:"relative"}});
  const attachBtn=h("button",{className:"ib",onClick:()=>{S.attachOpen=!S.attachOpen;render();}});
  attachBtn.appendChild(ico("share",18,S.attachOpen?"var(--ac)":"var(--t3)"));attachMenu.appendChild(attachBtn);
  if(S.attachOpen){
    const am=h("div",{className:"dropdown",style:{bottom:"110%",left:"0",minWidth:"140px"}});
    const attachItems=[
      {icon:"📸",lb:"Send Image",fn:()=>{openFilePicker();S.attachOpen=false;}},
      {icon:"📍",lb:"Location",fn:()=>{shareLocation();S.attachOpen=false;render();}},

      {icon:"🎭",lb:"Stickers",fn:()=>{S.stickerPanel=!S.stickerPanel;S.attachOpen=false;render();}},
      {icon:"📊",lb:"Poll",fn:()=>{S.pollModal=true;S.attachOpen=false;render();}},
      {icon:"🎮",lb:"Games",fn:()=>{S.gameMenu=!S.gameMenu;S.attachOpen=false;render();}},
    ];
    attachItems.forEach(item=>{
      const btn=h("button",{className:"ditem",onClick:item.fn});
      btn.appendChild(document.createTextNode(item.icon+" "+item.lb));
      am.appendChild(btn);
    });
    attachMenu.appendChild(am);
  }
  ibar.appendChild(attachMenu);

  const textarea=document.createElement("textarea");
  textarea.id="chat-input";textarea.className="msg-input";
  textarea.placeholder=S.rec?"🎤 "+S.recSec+"s...":(S.editMsg?T.edit:T.typePH);
  textarea.rows=1;textarea.value=S.editMsg?S.editTxt:(S.input||"");
  if(S.rec)textarea.disabled=true;

  textarea.addEventListener("input",e=>{
    if(S.editMsg)S.editTxt=e.target.value;
    else S.input=e.target.value;
    // resize — NO render() call
    e.target.style.height="auto";
    e.target.style.height=Math.min(e.target.scrollHeight,88)+"px";
    // update send button directly — no re-render
    const sb=document.getElementById("send-btn");
    if(sb){
      const hasText=e.target.value.trim();
      sb.style.background=hasText?"linear-gradient(135deg,var(--ac),var(--ac2))":"var(--bg3)";
      sb.style.color=hasText?"#020c18":"var(--t3)";
      sb.style.boxShadow=hasText?"0 3px 14px rgba(14,165,233,.45)":"none";
    }
    // typing indicator debounced — no render
    sendTypingIndicator(true);
  });
  textarea.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(S.editMsg)commitEdit();else doSend();}
    if(e.key==="Escape"&&S.editMsg){S.editMsg=null;S.editTxt="";render();}
  });
  textarea.addEventListener("focus",e=>{e.target.style.borderColor="var(--ac)";});
  textarea.addEventListener("blur",e=>{e.target.style.borderColor="var(--bd2)";sendTypingIndicator(false);});
  ibar.appendChild(textarea);

  // Mic button (hide for YOU chat)
  if(c.name!==YOU_NAME){
    const micBtn=h("button",{style:{background:S.rec?"#ef4444":"var(--bg2)",border:"1px solid "+(S.rec?"#ef4444":"var(--bd2)"),cursor:"pointer",padding:"10px",borderRadius:"50%",flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center",animation:S.rec?"recPulse 1s infinite":"none"}});
    micBtn.appendChild(ico("mic",18,S.rec?"#fff":"var(--t3)"));
    micBtn.addEventListener("mousedown",startRec);micBtn.addEventListener("mouseup",stopRec);
    micBtn.addEventListener("touchstart",startRec,{passive:false});micBtn.addEventListener("touchend",stopRec,{passive:false});
    ibar.appendChild(micBtn);
  }

  const sendBtn=document.createElement("button");
  sendBtn.id="send-btn";sendBtn.className="send-btn";
  const hasInput=S.editMsg?S.editTxt.trim():(S.input||"").trim();
  sendBtn.style.background=hasInput?"var(--ac)":"var(--bg3)";
  sendBtn.style.color=hasInput?"#031a03":"var(--t3)";
  sendBtn.appendChild(ico("send",14,hasInput?"#031a03":"var(--t3)"));
  sendBtn.appendChild(document.createTextNode(" "+(S.editMsg?T.save:T.send)));
  sendBtn.onclick=()=>{if(S.editMsg)commitEdit();else doSend();};
  ibar.appendChild(sendBtn);

  if(S.editMsg){
    const cx=h("button",{style:{background:"transparent",border:"1px solid var(--bd2)",borderRadius:"20px",padding:"9px 12px",cursor:"pointer",color:"var(--t3)",fontSize:"11px",fontWeight:"700",flexShrink:"0"},onClick:()=>{S.editMsg=null;S.editTxt="";render();}},T.cancel);
    ibar.appendChild(cx);
  }
  wrap.appendChild(ibar);

  setTimeout(()=>{
    const ta=document.getElementById("chat-input");
    if(ta&&!S.editMsg)ta.focus();
  },60);

  return wrap;
}

/* -- Single Message -- */
function renderMessage(m,chat){
  if(!m||!m.id||!S.user)return h("span",{});
  const own=m.from===S.user.name;
  const isYouChat=chat.name===YOU_NAME;
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"4px",animation:"popIn .2s ease",position:"relative"}});

  // Poll message
  if(m.type==="poll"){
    const pWrap=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"6px"}});
    const pb=h("div",{className:"bubble "+(own?"own":"other")});
    pb.appendChild(renderPollBubble(m,own));
    pWrap.appendChild(pb);
    return pWrap;
  }

  // Game invite message
  if(m.type==="game_invite"){
    const wrap2=h("div",{style:{display:"flex",flexDirection:"column",alignItems:own?"flex-end":"flex-start",marginBottom:"6px"}});
    wrap2.appendChild(renderGameInviteCard(m,own));
    return wrap2;
  }

  // System message
  if(m.type==="system"){
    const sm=h("div",{style:{textAlign:"center",padding:"4px 12px",margin:"4px auto",background:"var(--bg2)",borderRadius:"12px",fontSize:"9px",color:"var(--t3)",border:"1px solid var(--bd)"}},m.text);
    wrap.appendChild(sm);return wrap;
  }

  // Group sender name
  if(!own&&chat.type==="group"&&!isYouChat){
    const fr=h("div",{style:{fontSize:"9px",color:"var(--ac)",marginBottom:"2px",paddingLeft:"10px",fontWeight:"800",display:"flex",alignItems:"center",gap:"4px"}},m.from);
    const isOwnerMsg=isOwnerAccount(m.from);const mv=isOwnerMsg?ownerBadge(7):vipBadge(S.users[m.from]?.vipCode,7);if(mv)fr.appendChild(mv);
    wrap.appendChild(fr);
  }

  // Message row
  const row=h("div",{className:"msg-row"+(own?" own":"")+(isYouChat?" you-msg":"")});

  if(!own&&chat.type!=="dm")row.appendChild(av(m.from,22,{}));

  // Bubble
  let bubbleClass="bubble "+(own?"own":isYouChat?"you-msg":"other");
  const bubble=h("div",{className:bubbleClass,style:{minWidth:"80px"}});

  // Reply preview
  if(m.replyTo&&!m.deleted){
    const rp=h("div",{style:{background:"rgba(0,0,0,.2)",borderRadius:"8px",padding:"5px 8px",marginBottom:"6px",borderLeft:"2px solid "+(own?"rgba(255,255,255,.5)":"var(--ac)"),fontSize:"10px",cursor:"pointer"},onClick:()=>{
      const orig=document.getElementById("msg-"+m.replyTo.id);
      if(orig){orig.scrollIntoView({behavior:"smooth"});orig.style.animation="none";setTimeout(()=>orig.style.animation="",50);}
    }});
    rp.appendChild(h("div",{style:{fontWeight:"800",marginBottom:"2px",opacity:".8"}},m.replyTo.from));
    rp.appendChild(h("div",{style:{opacity:".7",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},m.replyTo.text?.slice(0,50)));
    bubble.appendChild(rp);
  }

  if(m.deleted){
    bubble.appendChild(h("span",{style:{opacity:".5",fontStyle:"italic",fontSize:"11px"}},"🚫 "+m.text));
  } else if(m.type==="voice"){
    bubble.appendChild(renderVoicePlayer(m,own));
  } else if(m.type==="sticker"){
    const sEl = h("div", {className: "sticker-bubble", title: m.text});
    sEl.textContent = m.text;
    bubble.className = "sticker-bubble";
    bubble.appendChild(sEl);
  } else if(m.type==="image"){
    bubble.appendChild(renderImgBubble(m,own));
  } else {
    const richEl = renderRichText(m.deleted ? "🚫 "+m.text : m.text, own);
    if(S.chatSearchQ && m.text && !m.deleted){
      try{
        const rx=new RegExp("("+S.chatSearchQ.replace(/[.*+?^${}()|[\]\\]/g,"\$&")+")","gi");
        richEl.innerHTML=richEl.innerHTML.replace(rx,'<span class="highlight">$1</span>');
      }catch(ex){}
    }
    bubble.appendChild(richEl);
    if(m.edited&&!m.deleted)bubble.appendChild(h("span",{style:{fontSize:"9px",opacity:".5",marginLeft:"6px"}},"(edited)"));
  }

  // Reactions (v8 chips)
  if(m.reactions&&Object.keys(m.reactions).length){
    const rr=h("div",{className:"rxn-row"});
    const rmap={};
    Object.entries(m.reactions).forEach(([usr,emoji])=>{rmap[emoji]=(rmap[emoji]||[]);rmap[emoji].push(usr);});
    Object.entries(rmap).forEach(([emoji,rusers])=>{
      const mine=m.reactions[S.user?.name]===emoji;
      const chip=h("button",{className:"rxn-chip"+(mine?" mine":""),onClick:()=>{
        if(!S.activeChat)return;
        const nr={...(m.reactions||{})};
        if(nr[S.user.name]===emoji)delete nr[S.user.name];else nr[S.user.name]=emoji;
        DB.updateMessage(S.activeChat.id,m.id,{reactions:nr});
        S.msgMenu=null; S.rxnPicker=null;
      }});
      chip.appendChild(document.createTextNode(emoji));
      if(rusers.length>1)chip.appendChild(h("span",{},rusers.length));
      rr.appendChild(chip);
    });
    bubble.appendChild(rr);
  }

  // Time + ticks
  const tl=h("div",{style:{display:"flex",alignItems:"center",gap:"3px",marginTop:"3px",justifyContent:"flex-end",whiteSpace:"nowrap",flexShrink:"0",flexWrap:"nowrap"}});
  tl.appendChild(h("span",{style:{fontSize:"9px",opacity:".55",fontFamily:"JetBrains Mono,monospace",whiteSpace:"nowrap",flexShrink:"0"}},timeFmt(m.ts)));
  if(own&&!m.deleted){
    const tick=h("span",{style:{fontSize:"9px",color:m._read?"#38bdf8":m._delivered?"rgba(255,255,255,.5)":"rgba(255,255,255,.3)",flexShrink:"0"}},"✓"+(m._delivered||m._read?"✓":""));
    tl.appendChild(tick);
  }
  bubble.appendChild(tl);

  row.appendChild(bubble);
  row.id="msg-"+m.id;
  wrap.dataset.msgId=m.id;
  wrap.dataset.reactions=JSON.stringify(m.reactions||{});
  wrap.dataset.deleted=String(m.deleted||false);

  // Quick reactions
  const qr=h("div",{className:"quick-rxn-bar",style:{display:S.msgMenu===m.id?"flex":"none",flexDirection:own?"row-reverse":"row",justifyContent:own?"flex-start":"flex-start"}});
// ALL_RXNS defined in STICKER_PACKS block
  ALL_RXNS.slice(0,8).forEach(em=>{
    const rb=h("button",{className:"quick-rxn-btn",onClick:e=>{
      e.stopPropagation();
      if(!S.activeChat)return;
      const newR={...(m.reactions||{})};
      if(newR[S.user.name]===em) delete newR[S.user.name];
      else newR[S.user.name]=em;
      DB.updateMessage(S.activeChat.id,m.id,{reactions:newR});
      S.msgMenu=null; S.rxnPicker=null;
    }});
    rb.appendChild(document.createTextNode(em));qr.appendChild(rb);
  });
  // + More reactions button
  const moreRxn=h("button",{className:"quick-rxn-btn",style:{fontSize:"12px",color:"var(--t3)"},onClick:e=>{
    e.stopPropagation();
    S.rxnPicker=S.rxnPicker===m.id?null:m.id;
    render();
  }},"+");
  qr.appendChild(moreRxn);
  wrap.appendChild(qr);
  if(S.rxnPicker===m.id){const rp=renderRxnPicker(m,own);rp.style.position="absolute";rp.style[own?"right":"left"]="0";rp.style.bottom="calc(100% + 4px)";wrap.style.position="relative";wrap.appendChild(rp);}
  wrap.appendChild(row);

  // Message menu
  if(S.msgMenu===m.id){
    const t2=T;
    const menu=h("div",{className:"dropdown",style:{[own?"right":"left"]:"0",bottom:"100%",marginBottom:"4px"}});
    const menuItems=[
      {ic:"reply",lb:t2.replyTo,fn:()=>{S.replyTo=m;S.msgMenu=null;render();}},
      {ic:"copy",lb:t2.copy,fn:()=>{navigator.clipboard?.writeText(m.text);S.msgMenu=null;showToast("Copied!","📋");render();}},
      {ic:"star",lb:m.starred?t2.unstar:t2.star,fn:()=>toggleStar(m)},
      {ic:"forward",lb:t2.forward,fn:()=>{S.forwardMsg=m;S.msgMenu=null;render();}},

    ];
    if(own&&!m.deleted){
      menuItems.push({ic:"edit",lb:t2.edit,fn:()=>{S.editMsg=m;S.editTxt=m.text;S.msgMenu=null;render();}});
      menuItems.push({ic:"trash",lb:t2.delete,fn:()=>deleteMsg(m),danger:true});
    }
    menuItems.forEach(item=>{
      const btn=h("button",{className:"ditem"+(item.danger?" danger":""),onClick:item.fn});
      btn.appendChild(ico(item.ic,12,item.danger?"#f87171":"var(--t3)"));
      btn.appendChild(document.createTextNode(" "+item.lb));
      menu.appendChild(btn);
    });
    wrap.appendChild(menu);
  }

  // Swipe to reply
  attachSwipeReply(row, m);
  // Long press / click for menu
  let pressTimer;
  row.addEventListener("contextmenu",e=>{e.preventDefault();haptic(12);S.msgMenu=S.msgMenu===m.id?null:m.id;render();});

const GAME_DB_PATH = "games"; // Firebase path for games

/* ─── Send game invite ─── */
async function sendGameInvite(gameType, chatId, opponent){
  const gameId = uid();
  const gameData = {
    id: gameId,
    type: gameType,
    chatId: chatId,
    host: S.user.name,
    guest: opponent,
    status: "pending", // pending | accepted | declined | playing | finished
    board: gameType === "tictactoe" ? Array(9).fill(null) : null,
    turn: S.user.name, // host goes first
    winner: null,
    moves: 0,
    hostPick: null,
    guestPick: null,
    rpsResult: null,
    ts: Date.now(),
  };

  // Save game to Firebase
  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(gameData)
  });

  // Send invite message in chat
  const inviteMsg = {
    id: uid(),
    from: S.user.name,
    text: "🎮 Game invite: " + (gameType === "tictactoe" ? "Tic Tac Toe ❌⭕" : "Rock Paper Scissors ✊"),
    ts: Date.now(),
    type: "game_invite",
    gameId: gameId,
    gameType: gameType,
    replyTo: null,
    starred: false,
    reactions: {},
    deleted: false,
    edited: false,
  };
  await DB.sendMessage(chatId, inviteMsg);
  showToast("🎮 Game invite sent!", "✅");
}

/* ─── Listen to game updates ─── */
let _gameListeners = {};
function listenToGame(gameId){
  if(_gameListeners[gameId]) return;
  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const poll = async () => {
    try{
      const res = await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json");
      if(!res.ok) return;
      const game = await res.json();
      if(!game) return;
      const prev = S.onlineGame;
      S.onlineGame = game;
      // sync status into invite card
      if(game.chatId && S.messages[game.chatId]){
        Object.values(S.messages[game.chatId]).forEach(msg=>{
          if(msg.type==="game_invite"&&msg.gameId===gameId) msg.gameStatus=game.status;
        });
      }
      // Check if game just ended
      if(game.status === "finished" && prev && prev.status === "playing"){
        if(game.winner === S.user.name) showToast("🏆 You won!", "🎉");
        else if(game.winner === "draw") showToast("🤝 Draw!", "");
        else showToast("😔 You lost", "");
      }
      if(game.status === "declined"){
        showToast("❌ Game invite declined", "");
        S.activeGameId = null;
        S.onlineGame = null;
        clearInterval(_gameListeners[gameId]);
        delete _gameListeners[gameId];
      }
      render();
    }catch(e){}
  };
  poll();
  _gameListeners[gameId] = setInterval(poll, 1500);
}

/* ─── Online Tic Tac Toe move ─── */
async function onlineTTTMove(gameId, index){
  const game = S.onlineGame;
  if(!game || game.status !== "playing") return;
  if(game.turn !== S.user.name) return; // not your turn
  if(game.board[index]) return; // cell already taken

  const symbol = game.host === S.user.name ? "X" : "O";
  const newBoard = [...game.board];
  newBoard[index] = symbol;

  // check winner
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let winner = null;
  for(const [a,b,c] of wins){
    if(newBoard[a] && newBoard[a]===newBoard[b] && newBoard[a]===newBoard[c]){
      winner = game.turn; break;
    }
  }
  const moves = game.moves + 1;
  const isDraw = !winner && moves === 9;
  const nextTurn = game.turn === game.host ? game.guest : game.host;
  const status = (winner || isDraw) ? "finished" : "playing";

  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  const update = {
    board: newBoard,
    turn: nextTurn,
    winner: winner || (isDraw ? "draw" : null),
    moves: moves,
    status: status,
  };
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(update)
  });

  if(status === "finished"){
    const resultText = winner ? "🏆 " + winner + " wins Tic Tac Toe!" : "🤝 Tic Tac Toe: Draw!";
    const msg = {id:uid(),from:S.user.name,text:"🎮 "+resultText,ts:Date.now(),type:"text",replyTo:null,starred:false,reactions:{},deleted:false,edited:false};
    await DB.sendMessage(game.chatId, msg);
  }
}

/* ─── Online RPS move ─── */
async function onlineRPSMove(gameId, pick){
  const game = S.onlineGame;
  if(!game || game.status !== "playing") return;
  const isHost = game.host === S.user.name;
  const field = isHost ? "hostPick" : "guestPick";

  const B = "https://frostchat-whithout-number-default-rtdb.firebaseio.com";
  await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + "/" + field + ".json", {
    method: "PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(pick)
  });

  // check if round complete
  const newGame = {...game, [field]: pick};
  if(newGame.hostPick && newGame.guestPick){
    const beats = {"✊":"✌️", "✌️":"🖐️", "🖐️":"✊"};
    let winner = null, result = "";
    if(newGame.hostPick === newGame.guestPick){
      winner = "draw"; result = "🤝 Draw!";
    } else if(beats[newGame.hostPick] === newGame.guestPick){
      winner = newGame.host; result = "🏆 " + newGame.host + " wins RPS!";
    } else {
      winner = newGame.guest; result = "🏆 " + newGame.guest + " wins RPS!";
    }
    await fetch(B + "/" + GAME_DB_PATH + "/" + gameId + ".json", {
      method: "PATCH",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({status:"finished", winner, rpsResult: result})
    });

/* ── Rich Text Renderer ── */
function renderRichText(text, own){
  const el = document.createElement("div");
  el.style.cssText = "font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap;";
  if(!text){return el;}
  // Bold **text**, italic _text_, code `text`, links
  let html2 = (text+"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\_(.+?)\_/g,"<em>$1</em>")
    .replace(/\`(.+?)\`/g,"<code style='background:rgba(0,0,0,.2);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px;'>$1</code>")
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--ac);text-decoration:underline;word-break:break-all;">$1</a>');
  el.innerHTML = html2;
  return el;
}

/* ── Swipe to Reply ── */
function attachSwipeReply(row, m){
  let startX = 0, moved = false;
  row.addEventListener("touchstart", e=>{ startX = e.touches[0].clientX; moved = false; }, {passive:true});
  row.addEventListener("touchmove", e=>{
    const dx = e.touches[0].clientX - startX;
    const own = row.classList.contains("own");
    if(own && dx < -30){ moved = true; row.style.transform = "translateX("+Math.max(dx,-60)+"px)"; }
    else if(!own && dx > 30){ moved = true; row.style.transform = "translateX("+Math.min(dx,60)+"px)"; }
  }, {passive:true});
  row.addEventListener("touchend", ()=>{
    row.style.transform = "";
    if(moved){ S.replyTo = m; render(); showToast(T.replyingTo + m.from, "↩️"); }
    moved = false;
  });
}
